name: Monitoramento WatchTower 24/7

on:
  schedule:
    - cron: '*/30 * * * *' 
  workflow_dispatch:     

jobs:
  monitorar:
    runs-on: ubuntu-latest
    permissions:
      contents: write    
    steps:
      - name: Baixando Código do Repositório
        uses: actions/checkout@v4

      - name: Configurando Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalando Dependências
        run: pip install requests

      - name: Executando Robô WatchTower
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python monitor_watchtower_cloud.py

      - name: Salvando Planilha e Memória
        run: |
          git config --global user.name "WatchTower-Bot"
          git config --global user.email "bot@watchtower.com"
          git add memorizadas.txt historico_vulnerabilidades.csv || true
          git commit -m "Sistema: Atualização da planilha de governança" || exit 0
          git push
